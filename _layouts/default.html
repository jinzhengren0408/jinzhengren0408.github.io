<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description | escape }}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="{{ '/' | relative_url }}#top">{{ site.title }}</a>
      <nav class="nav-links" aria-label="Main navigation">
        <a class="active" href="#about">About Me</a>
        <a href="#experience">Experience</a>
        <a href="#projects">Projects</a>
        <a href="#publications">Publications</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>
  <main class="container" id="top">
    {{ content }}
  </main>
  <footer>
    <div class="container">Jekyll academic website for {{ site.title }}.</div>
  </footer>
</body>
</html>
