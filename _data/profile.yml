biography:
- I am a Bachelor of Advanced Computing (Research and Development) (Honours) student
  at the Australian National University, working on <code>computational biology</code>,
  <code>bioinformatics</code>, and <code>machine learning</code>.
- My current research focuses on <code>representation learning</code> for biological
  systems, including mobile genetic elements, <code>protein language models</code>,
  and deep learning for spatiotemporal biological imaging.
- Alongside undergraduate study, I have held remote research roles with the University
  of Bath, EMBL-EBI, and Monash University, working across viral genomics, functional
  organisation in protein embeddings, and developmental modelling.
